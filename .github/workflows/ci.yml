name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-test:
    name: Build & Test
    runs-on: macos-14

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show Xcode version
        run: xcodebuild -version

      - name: Select an available iOS Simulator
        id: sim
        run: |
          UDID=$(xcrun simctl list devices available --json \
            | python3 -c "import json,sys; devices=json.load(sys.stdin)['devices']; ids=[d['udid'] for runtime in devices.values() for d in runtime if d.get('isAvailable') and d['name'].startswith('iPhone')]; print(ids[0])")
          echo "Using simulator $UDID"
          echo "udid=$UDID" >> "$GITHUB_OUTPUT"

      - name: Build and run tests
        run: |
          set -o pipefail
          xcodebuild test \
            -project Qubric.xcodeproj \
            -scheme Qubric \
            -destination "id=${{ steps.sim.outputs.udid }}" \
            CODE_SIGNING_ALLOWED=NO
